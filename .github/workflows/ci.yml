name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=hermes_council --cov-report=term-missing --cov-report=json

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.13'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          COV=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          if [ "$COV" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COV" -ge 80 ]; then COLOR="green"
          elif [ "$COV" -ge 70 ]; then COLOR="yellowgreen"
          elif [ "$COV" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -d "{\"files\":{\"coverage.json\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"coverage\\\",\\\"message\\\":\\\"${COV}%\\\",\\\"color\\\":\\\"${COLOR}\\\"}\"}}}" \
            https://api.github.com/gists/316e2a72a4089fdb4fddc9980ed1c28b
